<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading Secure Content...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#0f0f0f,#1c1c1c,#000);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    color: white;
}

@keyframes bgMove {
    0% {background-position:0% 50%}
    50% {background-position:100% 50%}
    100% {background-position:0% 50%}
}

.card {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 0 60px rgba(0,255,255,0.2);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:scale(0.9);}
    to {opacity:1; transform:scale(1);}
}

.title {
    font-size: 26px;
    margin-bottom: 20px;
    letter-spacing: 2px;
    color: #00ffff;
}

.frame {
    width: 300px;
    height: 300px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,255,255,0.6);
}

.frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.status {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">Securing Connection...</div>

    <div class="frame">
        <img id="prankGif" src="">
    </div>

    <div class="status">Please wait while we verify your device.</div>
</div>

<script>
// 🎲 Local GIF files
const GIFS = [
    "assets/rickroll.gif",
    "assets/tung.gif",
    "assets/baby.gif",
    "assets/67.gif"
];

// Random GIF
document.getElementById("prankGif").src =
    GIFS[Math.floor(Math.random() * GIFS.length)];

// 📳 Vibrate 2 seconds every 5 seconds
function startVibrationLoop() {
    if (!navigator.vibrate) return;

    setInterval(() => {
        navigator.vibrate(2000); // vibrate for 2 seconds
    }, 5000);
}

startVibrationLoop();
</script>

</body>
</html>
