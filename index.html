<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#f5f7fa,#c3cfe2);
    font-family: 'Segoe UI', sans-serif;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    text-align: center;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

.title {
    font-size: 26px;
    margin-bottom: 20px;
    font-weight: 600;
    color: #333;
}

.frame {
    width: 320px;
    height: 320px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>

<body>

<div class="card">
    <div class="title" id="gifTitle">Loading...</div>
    <div class="frame">
        <img id="prankGif" src="">
    </div>
</div>

<!-- Audio -->
<audio id="bgMusic" src="sounds/song.mp3" autoplay loop></audio>

<script>
// 🎲 GIF list with display names
const GIFS = [
    { file: "assets/rickroll.gif", name: "Never Gonna Give You Up" },
    { file: "assets/tung.gif", name: "Tung Tung Sahur" },
    { file: "assets/baby.gif", name: "Funny Baby" },
    { file: "assets/67.gif", name: "Meme 67" }
];

// Pick random GIF
const random = GIFS[Math.floor(Math.random() * GIFS.length)];

document.getElementById("prankGif").src = random.file;
document.getElementById("gifTitle").textContent = random.name;

// Force play audio (for browsers that block autoplay)
const music = document.getElementById("bgMusic");
music.volume = 0.8;

window.addEventListener("click", () => {
    music.play();
});
</script>

</body>
</html>
